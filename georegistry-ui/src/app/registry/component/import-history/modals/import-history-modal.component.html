<div>


  <div *ngIf="message != null" class="alert alert-danger" role="alert">{{message}}</div>

  <div class="heading text-center">
    <h1 *ngIf="label != null">
      {{label.localizedValue}} Import History
    </h1>
  </div>
  <div class="row">
    <div class="col-md-6 text-center">
      <h3>Filename</h3>
    </div>
    <div class="col-md-6 text-center">
      <h3>Import Date</h3>
    </div>
  </div>
  <div class="modal-form">

    <div class="row-holder">

      <div class="row" *ngFor="let history of histories">
        <div class="col-md-6 text-center">
          <a [routerLink]="'/registry/job/' + history.historyId" (click)="bsModalRef.hide()">{{history.filename}}</a>
        </div>
        <div class="col-md-6 text-center">
          <date-text [date]="history.importDate"></date-text>
        </div>
      </div>
    </div>

    <div class="row-holder">
      <div class="button-holder">
        <button type="button" class="btn btn-default" (click)="close()">
          <localize key="modal.button.close"></localize>
        </button>
      </div>
    </div>
  </div>

</div>

<div>


  <div *ngIf="message != null" class="alert alert-danger" role="alert">{{message}}</div>

  <form #form="ngForm" *ngIf="type != null && typeCode != null" class="modal-form" (ngSubmit)="form.valid">
    <div class="heading text-center">
      <h1>
        <localize *ngIf="readOnly" key="graph.data.view.type"></localize>
        <localize *ngIf="!readOnly" key="graph.data.edit.type"></localize>
        : {{type.label.localizedValue}}
      </h1>
    </div>
    <fieldset>
      <div class="row-holder">
        <div class="label-holder">
          <label>
            <localize key="data.property.label.code"></localize>
          </label>
        </div>
        <div class="holder">
          <span class="text"> <input type="text" [(ngModel)]="type.code" name="code" disabled required>
          </span>
        </div>
      </div>

      <localized-input [disabled]="readOnly" [(value)]="type.label" key="data.property.label.label">
      </localized-input>

      <localized-text [disabled]="readOnly" [(value)]="type.description" key="data.property.label.description">
      </localized-text>


      <div class="row-holder">
        <div class="button-holder">
          <button type="button" class="btn btn-default" (click)="close()">
            <localize key="modal.button.cancel"></localize>
          </button>
          <button *ngIf="!readOnly" type="button" class="btn btn-primary" [disabled]="form.invalid" (click)="update()">
            <localize key="modal.button.submit"></localize>
          </button>
        </div>
      </div>
    </fieldset>
  </form>

</div>

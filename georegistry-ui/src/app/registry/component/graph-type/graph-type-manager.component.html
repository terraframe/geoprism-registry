<page-container>



    <div class="heading">
        <h2>
            <localize *ngIf="typeCode != null && typeCode === 'DirectedAcyclicGraphType'" key="header.dag.type"></localize>
            <localize *ngIf="typeCode != null && typeCode !== 'DirectedAcyclicGraphType'" key="header.undirected.type"></localize>
        </h2>
    </div>

    <div *ngIf="message != null" class="alert alert-danger" role="alert">{{message}}</div>


    <div *ngIf="types && types.length === 0" class="row">
        <div class="col-md-12">
            <div class="py-5">
                <p class="inline-message">
                    <localize key="graph.data.noTypes"></localize>
                </p>
            </div>
        </div>
    </div>

    <ul *ngIf="types && types.length > 0" class="type-group"
        style="border-bottom: 2px solid lightgrey; margin-top: 30px;">
        <table class="table">
            <thead>
                <tr>
                    <th style="width: 70%;">
                        <localize key="graph.data.types"></localize>
                    </th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <tr *ngFor="let type of types; let i = index;" class="clickable">
                    <td style="width: 70%; vertical-align: middle;">
                        {{type.label.localizedValue}}
                    </td>
                    <td style="width: 30%; text-align: right;">
                        <button type="submit" (click)="onImportHistory(type)" class="btn btn-success" role="button">
                            <localize key="modal.button.import.history"></localize>
                        </button>
                        <button type="submit" (click)="onEdit(type)" class="btn btn-default" role="button">
                            <localize key="modal.button.edit"></localize>
                        </button>
                        <button type="submit" (click)="onDelete(type)" class="btn btn-danger" role="button">
                            <localize key="modal.button.delete"></localize>
                        </button>
                    </td>
                </tr>
            </tbody>
        </table>
    </ul>
    <div style="margin-top: 30px; margin-bottom: 30px;" class="row">
        <div class="col-md-6">
            <button type="submit" (click)="onCreate()" class="btn btn-primary" role="button">
                <localize key="hierarchy.management.button.create"></localize>
            </button>
        </div>
    </div>
</page-container>

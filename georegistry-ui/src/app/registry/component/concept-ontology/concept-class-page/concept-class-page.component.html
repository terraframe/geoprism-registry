<!--   <h2> <localize key="hierarchy.management.title"></localize> </h2> -->
<div class="row">

	<nav class="col-md-2 hierarchy-sidebar">

		<accordion [isAnimated]="true" [closeOthers]="false">
			<accordion-group [panelClass]="'hierarchy-sidebar-content'" [isOpen]="true" style="border-radius: 0;">
				<div accordion-heading style="padding: 10px 15px;">
					<span>
						<i style="margin-right:10px;" class="fa fa-circle"></i>
					</span>
					<!-- LOCALIZE -->
					Concept classes
					<!-- <localize key="concept.data.types"></localize> -->
				</div>
				<div class="sidebar-section-content">
					<ul *ngFor="let typeByOrg of typesByOrg;" class="list-group">
						<div>

							<div class="got-org-label-wrapper">
								<label>{{typeByOrg.org.label.localizedValue}}</label>
							</div>

							<div *ngIf="typeByOrg.write" style="text-align: center;padding: 10px 0;">
								<button (click)="createConceptClass(typeByOrg.org)" type="button"
									class="btn btn-primary" style="margin-bottom:20px;min-width:45%;">
									<localize key="modal.button.add"></localize>
								</button>
							</div>

							<li class="list-group-item type-item type-li-item" *ngFor="let type of typeByOrg.types"
								[ngClass]="{'primary active': (selection != null && selection.type != null && type.code === selection.type.code)}"
								(click)="handleTypeView(type)">
								{{type.displayLabel.localizedValue}}

								<div class="btn-group pull-right" dropdown [dropup]="true" container="body">
									<a class="pull-right" dropdownToggle (click)="$event.stopPropagation();"
										aria-controls="basic-link-dropdown">
										<i class="fa fa-ellipsis-vertical clickable dropdown-toggle"></i>
									</a>
									<ul *dropdownMenu class="dropdown-menu" role="menu"
										aria-labelledby="button-animated">
										<ng-container *ngIf="typeByOrg.write">
											<li role="menuitem">
												<a class="dropdown-item" (click)="handleDeleteConceptClass(type)">
													<localize key="button.delete.helptext"></localize>
												</a>
											</li>
										</ng-container>
										<li role="menuitem">
											<a class="dropdown-item"
												(click)="handleEditConceptClass(type, !typeByOrg.write)">
												<localize
													[key]="typeByOrg.write ? 'button.edit.helptext' : 'button.view.helptext'">
												</localize>
											</a>
										</li>
										<li role="menuitem">
											<a class="dropdown-item" (click)="onImportHistory(type)">
												<localize key="modal.button.import.history"></localize>
											</a>
										</li>
										<li role="menuitem">
											<a class="dropdown-item"
												[routerLink]="['/registry/object/', 'CONCEPT_OBJECT', type.oid]">
												<localize key="business.view.data"></localize>
											</a>
										</li>
									</ul>
								</div>
							</li>
						</div>
					</ul>
				</div>
			</accordion-group>
		</accordion>
	</nav>

	<div class="col-md-10 hierarchy-content">
		<div id="overflow-div">
			<create-concept-class *ngIf="selection != null && selection.action === Action.CREATE"
				[organization]="selection.org" (typeChange)="handleTypeChange($event)" (onCancel)="selection = null"
				(onError)="error($event)">
			</create-concept-class>

			<manage-concept-class
				*ngIf="selection != null && (selection.action === Action.EDIT || selection.action === Action.VIEW)"
				[type]="selection.type" [readOnly]="selection.readOnly" (typeChange)="handleTypeChange($event)"
				(onCancel)="selection = null" (onError)="error($event)">
			</manage-concept-class>

		</div>
	</div>
</div>

<page-container>
    <div class="row">
        <div class="col-md-12 order-md-1">
            <tabset>
                <tab heading="Geo-Object Types" id="geo-object-type">
                    <geo-object-type-page [userOrganization]="userOrganization" [organizations]="organizations"
                        [types]="geoObjectTypes" (typesChange)="setGeoObjectTypes($event)" (onError)="error($event)">
                    </geo-object-type-page>
                </tab>
                <tab heading="Hierarchy Types">
                    <hierarchy-type-page [userOrganization]="userOrganization" [organizations]="organizations"
                        [geoObjectTypes]="geoObjectTypes" [hierarchies]="hierarchies" (onError)="error($event)">
                    </hierarchy-type-page>

                </tab>
                <tab heading="Directed Acyclic Graph Type">
                    <graph-type-page [typeCode]="'DirectedAcyclicGraphType'"></graph-type-page>
                </tab>
                <tab heading="Undirected Graph Type">
                    <graph-type-page [typeCode]="'UndirectedGraphType'"></graph-type-page>
                </tab>
                <tab *ngIf="isSRA" heading="Import/Export">
                    <div *ngIf="isSRA" style="text-align: center;padding: 10px 0;">
                        <button (click)="importTypes()" type="button" class="btn btn-primary"
                            style="margin-bottom:20px;min-width:30%;">
                            <localize key="hierarchy.sidebar.importTypes"></localize>
                        </button>
                        <button (click)="exportTypes()" type="button" class="btn btn-primary"
                            style="margin-bottom:20px;margin-left:5px;min-width:30%;">
                            <localize key="hierarchy.sidebar.exportTypes"></localize>
                        </button>
                    </div>
                </tab>

            </tabset>
        </div>
    </div>

</page-container>

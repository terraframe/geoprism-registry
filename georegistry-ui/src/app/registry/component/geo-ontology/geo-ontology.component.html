<page-container>
    <div class="row">
        <div class="col-md-12 order-md-1">
            <tabset [justified]="true">
                <tab heading="Geo-Object Types" id="geo-object-type">
                    <geo-object-type-page [userOrganization]="userOrganization" [organizations]="organizations"
                        [types]="geoObjectTypes" (typesChange)="setGeoObjectTypes($event)" (onError)="error($event)">
                    </geo-object-type-page>
                </tab>
                <tab heading="Hierarchy Types">
                    <hierarchy-type-page [userOrganization]="userOrganization" [organizations]="organizations"
                        [geoObjectTypes]="geoObjectTypes" [hierarchies]="hierarchies"
                        (onHierarchyType)="handleHierarchyType($event)" (onGeoObjectType)="handleGeoObjectType($event)"
                        (onRemove)="handleRemoveHierarchyType($event)" (onError)="error($event)">
                    </hierarchy-type-page>

                </tab>
                <tab heading="Directed Acyclic Graph Type">
                    <graph-type-page [typeCode]="'DirectedAcyclicGraphType'"></graph-type-page>
                </tab>
                <tab heading="Undirected Graph Type">
                    <graph-type-page [typeCode]="'UndirectedGraphType'"></graph-type-page>
                </tab>
                <tab *ngIf="isSRA" [disabled]="true">
                    <ng-template tabHeading>
                        <a (click)="importTypes()" [title]="'hierarchy.sidebar.importTypes' | localize">
                            <i class="fa-solid fa-file-import"></i>
                        </a>
                        <a (click)="exportTypes()" [title]="'hierarchy.sidebar.exportTypes' | localize">
                            <i class="fa-solid fa-file-export"></i>
                        </a>
                    </ng-template>
                </tab>


            </tabset>
        </div>
    </div>

</page-container>

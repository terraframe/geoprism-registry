<!--   <h2> <localize key="hierarchy.management.title"></localize> </h2> -->
<div class="row">

    <nav class="col-md-3 hierarchy-sidebar">

        <accordion [isAnimated]="true" [closeOthers]="false">
            <accordion-group [panelClass]="'hierarchy-sidebar-content'" [isOpen]="true" style="border-radius: 0;">
                <div accordion-heading style="padding: 10px 15px;">
                    <span>
                        <i style="margin-right:10px;" class="fa fa-circle"></i>
                    </span>
                    <localize *ngIf="typeCode != null && typeCode === 'DirectedAcyclicGraphType'" key="header.dag.type">
                    </localize>
                    <localize *ngIf="typeCode != null && typeCode !== 'DirectedAcyclicGraphType'"
                        key="header.undirected.type">
                    </localize>
                </div>
                <div class="sidebar-section-content">

                    <div style="text-align: center;padding: 10px 0;">
                        <button (click)="onCreate()" type="button" class="btn btn-primary"
                            style="margin-bottom:20px;min-width:45%;">
                            <localize key="hierarchy.management.button.create"></localize>
                        </button>
                    </div>

                    <li class="list-group-item got-li-item" *ngFor="let type of types; let i = index;" [id]="type.code">
                        {{type.label.localizedValue}}

                        <div class="btn-group pull-right" dropdown [dropup]="true" container="body">
                            <a class="pull-right" dropdownToggle (click)="$event.stopPropagation();"
                                aria-controls="basic-link-dropdown">
                                <i class="fa fa-ellipsis-vertical clickable dropdown-toggle"></i>
                            </a>
                            <ul *dropdownMenu class="dropdown-menu" role="menu" aria-labelledby="button-animated">
                                <ng-container *ngIf="isSRA">
                                    <li role="menuitem">
                                        <a class="dropdown-item" (click)="onDelete(type)">
                                            <localize key="button.delete.helptext"></localize>
                                        </a>
                                    </li>
                                </ng-container>
                                <li role="menuitem">
                                    <a class="dropdown-item" (click)="onEdit(type)">
                                        <localize [key]="isSRA ? 'button.edit.helptext' : 'button.view.helptext'">
                                        </localize>
                                    </a>
                                </li>
                                <li role="menuitem">
                                    <a class="dropdown-item" (click)="onImportHistory(type)">
                                        <localize key="modal.button.import.history"></localize>
                                    </a>
                                </li>
                            </ul>
                        </div>

                    </li>
                </div>
            </accordion-group>
        </accordion>
    </nav>

    <div class="col-md-9 hierarchy-content">
        <div id="overflow-div">
            <create-graph-type *ngIf="selection != null && selection.action === Action.CREATE" [typeCode]="typeCode"
                (typeChange)="handleTypeChange($event)" (onCancel)="selection = null" (onError)="error($event)">
            </create-graph-type>

            <manage-graph-type *ngIf="selection != null && selection.action === Action.EDIT" [typeCode]="typeCode"
                [type]="selection.type" [readOnly]="selection.readOnly" (typeChange)="handleTypeChange($event)"
                (onCancel)="selection = null" (onError)="error($event)">
            </manage-graph-type>

        </div>
    </div>
</div>

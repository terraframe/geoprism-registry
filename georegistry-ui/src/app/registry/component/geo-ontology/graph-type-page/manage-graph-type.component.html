<div>


  <form #form="ngForm" *ngIf="type != null && typeCode != null" class="modal-form" (ngSubmit)="form.valid">
    <fieldset>

      <div class="row">
        <div class="col-md-12">
          <div class="form-group">
            <label for="codeInput">
              <localize key="data.property.label.code"></localize>
            </label>
            <span class="text">
              <input type="text" [(ngModel)]="type.code" name="code" [disabled]="readOnly || !isNew" required>
            </span>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="col-md-6">
          <div class="form-group" *ngFor="let localeValue of type.label.localeValues">
            <label for="labelInput">
              <localize key="data.property.label.label"></localize>
              <span style="color: #BABABA">&nbsp;(<convert-key-label
                  [key]="localeValue.locale"></convert-key-label>)</span>
            </label>
            <input [disabled]="readOnly" [(ngModel)]="localeValue.value" [name]="'label-' + localeValue.locale"
              type="input" class="form-control" required>
          </div>
        </div>
        <div class="col-md-6">
          <div class="form-group">
            <localized-text [disabled]="readOnly" [(value)]="type.description" key="data.property.label.description" [inlinelayout]="true">
            </localized-text>      
          </div>
        </div>
      </div>

      <div class="row-holder" *ngIf="!readOnly">
        <div class="button-holder">
          <button type="button" class="btn btn-default" (click)="close()">
            <localize key="modal.button.cancel"></localize>
          </button>
          <button *ngIf="!readOnly" type="button" class="btn btn-primary" [disabled]="form.invalid" (click)="update()">
            <localize key="modal.button.submit"></localize>
          </button>
        </div>
      </div>
    </fieldset>
  </form>

</div>

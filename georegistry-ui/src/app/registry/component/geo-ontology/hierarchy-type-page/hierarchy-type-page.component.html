<div>


	<!--   <h2> <localize key="hierarchy.management.title"></localize> </h2> -->
	<div class="row">

		<nav class="col-md-2 hierarchy-sidebar">

			<div class="row" style="padding: 5px 5px;">
				<div class="col-md-12">
					<input type="text" class="form-control" #searchInput
						[placeholder]="'hierarchy.sidebar.searchAll' | localize" [(ngModel)]="filter">
				</div>
			</div>
			<accordion *ngIf="selection == null || selection.action != Action.EDIT" [isAnimated]="true"
				[closeOthers]="false">
				<accordion-group [isOpen]="true" class="sidebar-section" style="border-radius: 0;"
					[panelClass]="'hierarchy-sidebar-content'">
					<div accordion-heading style="padding: 10px 15px;">
						<span>
							<i class="fa fa-sitemap"></i>
						</span>
						<localize key="hierarchy.sidebar.hierarchies"></localize>
					</div>
					<div class="sidebar-section-content">
						<ul *ngFor="let hierarchyByOrg of filteredHierarchiesByOrg" class="list-group">
							<div>

								<div class="got-org-label-wrapper">
									<label>{{hierarchyByOrg.org.label.localizedValue}}</label>
								</div>

								<div *ngIf="isSRA || hierarchyByOrg.org.code === userOrganization"
									style="text-align: center;padding: 10px 0;">
									<button (click)="handleCreateHierarchy(hierarchyByOrg.org.code)" type="button"
										class="btn btn-primary" style="margin-bottom:20px;min-width:45%;">
										<localize key="hierarchy.sidebar.newHierarchy"></localize>
									</button>
								</div>

								<li *ngFor="let hierarchy of hierarchyByOrg.hierarchies;" [id]="hierarchy.code"
									class="list-group-item hier-li-item"
									[ngClass]="{'primary active': (selection != null && hierarchy.code === selection.type.code)}"
									(click)="handleTypeView(hierarchy)">
									{{hierarchy.label.localizedValue}}

									<div class="btn-group pull-right" dropdown [dropup]="true" container="body">
										<a class="pull-right" id="basic-link" dropdownToggle
											(click)="$event.stopPropagation();" aria-controls="basic-link-dropdown">
											<i class="fa fa-ellipsis-vertical clickable dropdown-toggle"></i>
										</a>
										<ul id="dropdown-animated" *dropdownMenu class="dropdown-menu" role="menu"
											aria-labelledby="button-animated">
											<ng-container *ngIf="isOrganizationRA(hierarchy.organizationCode)">
												<li role="menuitem">
													<a class="dropdown-item"
														(click)="handleDeleteHierarchyType(hierarchy)">
														<localize key="button.delete.helptext"></localize>
													</a>
												</li>
												<li role="menuitem">
													<a class="dropdown-item"
														(click)="handleEditHierarchyType(hierarchy, false)">
														<localize key="button.edit.helptext"></localize>
													</a>
												</li>
												<li role="menuitem">
													<a class="dropdown-item" (click)="onImportHistory(hierarchy)">
														<localize key="modal.button.import.history"></localize>
													</a>
												</li>
											</ng-container>
											<ng-container *ngIf="!isOrganizationRA(hierarchy.organizationCode)">
												<li role="menuitem">
													<a class="dropdown-item"
														(click)="handleEditHierarchyType(hierarchy, false)">
														<localize key="button.view.helptext"></localize>
													</a>
												</li>
											</ng-container>

										</ul>
									</div>
								</li>
							</div>
						</ul>
					</div>
				</accordion-group>
			</accordion>
			<ng-container *ngIf="selection != null && selection.action == Action.EDIT">

				<drag-sidebar *ngIf="selection != null && selection.action == Action.EDIT" [typesByOrg]="typesByOrg"
					(onDrag)="handleDrag($event)" (onDrop)="handleDrop($event)">
				</drag-sidebar>

			</ng-container>
		</nav>

		<div class="col-md-10">
			<ng-container *ngIf="selection != null">
				<tabset>
					<tab heading="Metadata" [active]="tab === Tab.METADATA" (selectTab)="handleTabChange(Tab.METADATA)">
						<hierarchy-type [hierarchyType]="selection.type" [edit]="selection.action === Action.EDIT"
							[readOnly]="selection.action === Action.VIEW" (onClose)="handleTypeChange($event)"
							(onError)="error($event)">
						</hierarchy-type>

					</tab>
					<tab *ngIf="selection.action !== Action.CREATE" heading="Hierarchy" [active]="tab === Tab.HIERARCHY"
						(selectTab)="handleTabChange(Tab.HIERARCHY)">
						<div *ngIf="selection != null">
							<div class="row">
								<div class="col-md-12">
									<div class="hierarchy-content">
										<div id="overflow-div">
											<div
												*ngIf="(selection.type.rootGeoObjectTypes == null || selection.type.rootGeoObjectTypes.length == 0)">
												<div *ngIf="isOrganizationRA(selection.type.organizationCode, true)"
													id="emptyHierarchyDropzone" class="drop-box-container">
													<div class="hierarchy-drop-box">
														<div class="inner-drop-box">
															<p class="upload-text">
																<localize key="hierarchy.content.dragGotToHierarchy">
																</localize>
															</p>
														</div>
													</div>
												</div>
												<div *ngIf="!isOrganizationRA(selection.type.organizationCode, true)">
													<p class="upload-text">
														<localize key="hierarchy.content.emptyHierarchy"></localize>
													</p>
												</div>
											</div>

											<div id="svgHolder">
												<!-- <svg id="graph" style="width:1200px; height:750px"></svg> -->
											</div>
											<div id="NodeTooltip" class="modal-dialog">
												<div class="modal-content">
													<div class="modal-form">
														<div class="row-holder">
															<div class="label-holder">
																<label>
																	<localize
																		key="hierarchy.nodeTooltip.geoObjectTypeCode">
																	</localize>
																</label>
															</div>
															<div class="holder">
																<label id="geoObjectTypeCodeLabel"></label>
															</div>
														</div>
														<div class="row-holder">
															<div class="label-holder">
																<label>
																	<localize
																		key="hierarchy.nodeTooltip.geoObjectTypeOrganization">
																	</localize>
																</label>
															</div>
															<div class="holder">
																<label id="geoObjectTypeOrganizationLabel"></label>
															</div>
														</div>
														<div class="row-holder">
															<div class="label-holder">
																<label>
																	<localize key="hierarchy.nodeTooltip.hierarchy">
																	</localize>
																</label>
															</div>
															<div class="holder">
																<label id="hierarchyLabel"></label>
															</div>
														</div>
														<div class="row-holder">
															<div class="label-holder">
																<label>
																	<localize key="hierarchy.nodeTooltip.hierarchyCode">
																	</localize>
																</label>
															</div>
															<div class="holder">
																<label id="hierarchyCodeLabel"></label>
															</div>
														</div>
														<div class="row-holder">
															<div class="label-holder">
																<label>
																	<localize
																		key="hierarchy.nodeTooltip.hierarchyOrganization">
																	</localize>
																</label>
															</div>
															<div class="holder">
																<label id="hierarchyOrganizationLabel"></label>
															</div>
														</div>
													</div>
												</div>
											</div>
										</div>
									</div>
								</div>
							</div>
							<div class="row"
								*ngIf="selection.action === Action.EDIT">
								<div class="col-md-12">
									<div class="button-holder pull-right">
										<button type="button" class="btn btn-default" (click)="selection = null"
											style="padding: 4px 18px;margin-bottom: 5px;margin-right: 5px;">
											<localize key="modal.button.close"></localize>
										</button>
									</div>
								</div>
							</div>

						</div>
					</tab>
				</tabset>
			</ng-container>
		</div>
	</div>
</div>
